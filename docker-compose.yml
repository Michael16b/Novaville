services:

  postgres:
    image: postgres:15-alpine
    container_name: novaville-postgres
    environment:
      - POSTGRES_USER=novaville_user
      - POSTGRES_DB=novaville_db
      - POSTGRES_PASSWORD=YOUR_SECURE_PASSWORD
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - novaville-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d postgres -U novaville_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend Django + Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novaville-backend
    ports:
      - "8000:8000"
    environment:
      # Django settings
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=ChangeMe123
      # WARNING: The following keys use development-only defaults. MUST be changed for any deployment beyond local development.
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-unsafe-key-change-me-32chars}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY:-dev-only-unsafe-key-change-me-32chars}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_WSGI_MODULE=config.wsgi
      # CloudSQL / PostgreSQL
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-novaville_db}
      - DB_USER=${DB_USER:-novaville_user}
      - DB_PASSWORD=${DB_PASSWORD:-YOUR_SECURE_PASSWORD}
      # Options démarrage
      - MIGRATE=1
      - COLLECTSTATIC=1
      - GUNICORN_WORKERS=3
      - GUNICORN_TIMEOUT=120
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - novaville-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend Flutter Web (BLoC) + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL=${API_URL:-http://localhost:8000}
        - ENVIRONMENT=${ENVIRONMENT:-production}
    container_name: novaville-frontend
    environment:
      - FLUTTER_BACKEND_API=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
      - postgres
    networks:
      - novaville-net
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  novaville-net:
    driver: bridge