services:
  # Backend Django (MVT) + Gunicorn
  backend:
    build:
      context: .
      dockerfile: backend/DockerFile
    container_name: novaville-backend
    ports:
      - "8000:8000"
    environment:
      # Django settings
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_WSGI_MODULE=config.wsgi
      # CloudSQL / PostgreSQL
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-app}
      - DB_USER=${DB_USER:-app}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      # Options démarrage
      - MIGRATE=1
      - COLLECTSTATIC=1
      - GUNICORN_WORKERS=3
      - GUNICORN_TIMEOUT=120
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - novaville-net
    restart: unless-stopped

  # Frontend Flutter Web (BLoC) + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
      args:
        - API_URL=${API_URL:-http://localhost:8000}
        - ENVIRONMENT=${ENVIRONMENT:-production}
    container_name: novaville-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - novaville-net
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:

networks:
  novaville-net:
    driver: bridge
