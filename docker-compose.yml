services:

  postgres:
    image: postgres:15-alpine
    container_name: novaville-postgres
    environment:
      - POSTGRES_USER=${DB_USER:-novaville_user}
      - POSTGRES_DB=${DB_NAME:-novaville_db}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-novaville_dev_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - novaville-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${DB_NAME:-novaville_db} -U ${DB_USER:-novaville_user}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend Django + Gunicorn
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: novaville-backend
    ports:
      - "8000:8000"
    environment:
      # Django settings
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@novaville.fr}
      - DJANGO_SUPERUSER_FIRST_NAME=${DJANGO_SUPERUSER_FIRST_NAME:-Admin}
      - DJANGO_SUPERUSER_LAST_NAME=${DJANGO_SUPERUSER_LAST_NAME:-Novaville}
      # Required: admin account is only created when this variable is set (see ensure_admin command)
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD:-ChangeMe123}
      # WARNING: The following keys use development-only defaults. MUST be changed for any deployment beyond local development.
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-dev-only-unsafe-key-change-me-32chars}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY:-dev-only-unsafe-key-change-me-32chars}
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_WSGI_MODULE=config.wsgi
      # CloudSQL / PostgreSQL
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-novaville_db}
      - DB_USER=${DB_USER:-novaville_user}
      # Required: must match POSTGRES_PASSWORD set on the postgres service
      - DB_PASSWORD=${DB_PASSWORD:-novaville_dev_password}
      # Options démarrage
      - MIGRATE=1
      - COLLECTSTATIC=1
      - GUNICORN_WORKERS=3
      - GUNICORN_TIMEOUT=120
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - novaville-net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend Flutter Web (BLoC) + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # http://localhost = origine Nginx (port 80) qui proxy /api/ vers le backend.
        # Ne jamais utiliser http://localhost:8000 ici : c'est le port interne du backend,
        # inaccessible depuis le navigateur des utilisateurs finaux.
        - FLUTTER_BACKEND_API=http://localhost
        - ENVIRONMENT=${ENVIRONMENT:-production}
    container_name: novaville-frontend
    ports:
      - "80:8080"
    depends_on:
      - backend
      - postgres
    networks:
      - novaville-net
    restart: unless-stopped

  # Docusaurus Docs
  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    container_name: novaville-docs
    ports:
      - "3000:80"
    networks:
      - novaville-net
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
  postgres_data:

networks:
  novaville-net:
    driver: bridge