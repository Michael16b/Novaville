version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=novaville
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ton_password_securise
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-volume:/var/lib/postgresql/data
    networks:
      - novaville-bridge
    restart: always

  backend:
    image: novaville.azurecr.io/novaville-backend:latest
    container_name: backend
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=novaville
      - DB_USER=postgres
      - DB_PASSWORD=ton_password_securise
      - MIGRATE=1
      - COLLECTSTATIC=1
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=ChangeMe123
    depends_on:
      - postgres

  frontend:
    image: novaville.azurecr.io/novaville-frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-volume: # Le lien avec ton Path Mapping Azure
