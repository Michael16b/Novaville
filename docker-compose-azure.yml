version: '3.8'

# Azure deployment configuration
# IMPORTANT: Replace hardcoded credentials with Azure environment variables/secrets
# Set these in Azure App Service Configuration:
#   - POSTGRES_PASSWORD
#   - DJANGO_SUPERUSER_PASSWORD
#   - DB_PASSWORD (should match POSTGRES_PASSWORD)

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=novaville_db
      - POSTGRES_USER=novaville_user
      # SECURITY: Set this via Azure App Service environment variables
      - POSTGRES_PASSWORD=YOUR_SECURE_PASSWORD
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-volume:/var/lib/postgresql/data
    networks:
      - novaville-net # On force l'appartenance au réseau
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d novaville_db -U novaville_user"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: novaville.azurecr.io/novaville-backend:latest
    container_name: backend
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=novaville_db
      - DB_USER=novaville_user
      # SECURITY: Set these via Azure App Service environment variables
      - DB_PASSWORD=YOUR_SECURE_PASSWORD
      - MIGRATE=1
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=ChangeMe123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novaville-net
    restart: always

networks:
  novaville-net:
    driver: bridge # Ce bloc à la fin est indispensable pour lier les services

volumes:
  db-volume:
