version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=novaville
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ton_password_securise
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-volume:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: novaville.azurecr.io/novaville-backend:latest
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=novaville
      - DB_USER=postgres
      - DB_PASSWORD=ton_password_securise
      - MIGRATE=1
      - COLLECTSTATIC=1
      - DJANGO_SUPERUSER_USERNAME=admin #à changer
      - DJANGO_SUPERUSER_EMAIL=admin@example.com #à changer
      - DJANGO_SUPERUSER_PASSWORD=ChangeMe123 #à changer
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: novaville.azurecr.io/novaville-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
