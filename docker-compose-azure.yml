version: '3.8'

services:
  postgres:
    image: ${AZURE_ACR_NAME}.azurecr.io/bitnami-postgresql:15
    container_name: postgres
    user: "1001"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    environment:
      - POSTGRESQL_DATABASE=${DB_NAME}
      - POSTGRESQL_USERNAME=${DB_USER}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_VOLUME_DIR=/bitnami/postgresql
    volumes:
      - db-volume:/bitnami
    networks:
      - novaville-net
    restart: always
    healthcheck:
      # Use Bitnami-specific variable names (POSTGRESQL_USERNAME / POSTGRESQL_DATABASE)
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRESQL_USERNAME} -d $${POSTGRESQL_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${AZURE_ACR_NAME}.azurecr.io/novaville-backend:${GITHUB_SHA}
    container_name: backend
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MIGRATE=1
      - COLLECTSTATIC=1
      - DJANGO_LOG_LEVEL=INFO
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      - DJANGO_ALLOWED_HOSTS=novavilleapp.azurewebsites.net,novavilleapp-ghfkbnb7caa0c3g9.francecentral-01.azurewebsites.net,backend,localhost
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL}
      - DJANGO_SUPERUSER_FIRST_NAME=${DJANGO_SUPERUSER_FIRST_NAME}
      - DJANGO_SUPERUSER_LAST_NAME=${DJANGO_SUPERUSER_LAST_NAME}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
      - DJANGO_RESET_ADMIN_ON_DEPLOY=${DJANGO_RESET_ADMIN_ON_DEPLOY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novaville-net
    restart: always
    expose:
      - "8000"

  frontend:
    image: ${AZURE_ACR_NAME}.azurecr.io/novaville-frontend:${GITHUB_SHA}
    container_name: frontend
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:8080"
    networks:
      - novaville-net
    restart: always

networks:
  novaville-net:
    driver: bridge

volumes:
  db-volume: