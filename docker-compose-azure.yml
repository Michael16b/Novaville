version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=novaville
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=ton_password_securise
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - db-volume:/var/lib/postgresql/data
    networks:
      - novaville-net # On force l'appartenance au réseau
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d novaville -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: novaville.azurecr.io/novaville-backend:latest
    container_name: backend
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=novaville
      - DB_USER=postgres
      - DB_PASSWORD=ton_password_securise
      - MIGRATE=1
      # SECURITY: Replace these default credentials with Azure secrets/env vars in production
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=ChangeMe123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novaville-net
    restart: always

networks:
  novaville-net:
    driver: bridge # Ce bloc à la fin est indispensable pour lier les services

volumes:
  db-volume:
