version: '3.8'

services:
  postgres:
    # L'image Bitnami est beaucoup plus tolérante sur les permissions de volumes
    image: bitnami/postgresql:15
    container_name: postgres
    user: root  # Nécessaire sur Azure pour initialiser le volume
    environment:
      - POSTGRESQL_DATABASE=novaville_db
      - POSTGRESQL_USERNAME=novaville_user
      - POSTGRESQL_PASSWORD=YOUR_SECURE_PASSWORD
      # Cette variable désactive le check strict de propriété du dossier
      - POSTGRESQL_VOLUME_DIR=/bitnami/postgresql
    # volumes:
    #   # Bitnami utilise ce chemin interne pour les données
    #   - db-volume:/bitnami/postgresql/data
    networks:
      - novaville-net
    restart: always
    healthcheck:
      # Commande spécifique à Bitnami pour vérifier la santé
      test: ["CMD-SHELL", "pg_isready -U novaville_user -d novaville_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: novaville.azurecr.io/novaville-backend:latest
    container_name: backend
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=novaville_db
      - DB_USER=novaville_user
      - DB_PASSWORD=YOUR_SECURE_PASSWORD
      - MIGRATE=1
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=ChangeMe123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novaville-net
    restart: always

networks:
  novaville-net:
    driver: bridge

volumes:
  db-volume: