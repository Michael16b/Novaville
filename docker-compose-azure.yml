version: '3.8'

# Azure App Service – configuration multi-conteneurs.
#
# Les images sont pré-construites et poussées vers l'ACR par le workflow CI/CD
# (job build-and-push dans deploy_docker_azure.yml) avant le déploiement.
#
# AZURE_ACR_NAME est substitué à la volée par `envsubst` dans le job deploy
# du workflow CI/CD ; ce placeholder ne doit PAS être remplacé manuellement.
#
# NOTE : FLUTTER_BACKEND_API n'est PAS une variable d'environnement runtime
# pour le service frontend. L'URL du backend est compilée dans l'application
# Flutter Web au moment du build via :
#   --build-arg FLUTTER_BACKEND_API=${{ secrets.AZURE_APP_URL }}
# (voir le job build-and-push dans deploy_docker_azure.yml).

services:
  # --- BASE DE DONNÉES ---
  postgres:
    image: ${AZURE_ACR_NAME}.azurecr.io/bitnami-postgresql:15
    container_name: postgres
    # Utiliser l'UID Bitnami pour que les fichiers créés lui appartiennent
    user: "1001"
    environment:
      - POSTGRESQL_DATABASE=${DB_NAME}
      - POSTGRESQL_USERNAME=${DB_USER}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
      # On monte le volume sur /bitnami pour que Postgres crée son propre
      # sous-dossier 'postgresql' avec les bons droits à l'intérieur.
      - POSTGRESQL_VOLUME_DIR=/bitnami/postgresql
    volumes:
      - db-volume:/bitnami
    networks:
      - novaville-net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- DJANGO BACKEND ---
  backend:
    image: ${AZURE_ACR_NAME}.azurecr.io/novaville-backend:latest
    container_name: backend
    # IMPORTANT : DJANGO_SECRET_KEY, JWT_SIGNING_KEY, DB_PASSWORD, DB_NAME et DB_USER
    # doivent être configurés dans les "Application Settings" de l'Azure App Service
    # AVANT le déploiement. La syntaxe ${VAR:?message} ci-dessous est honorée par
    # Docker Compose en local mais peut ne pas bloquer le démarrage sur Azure ;
    # les App Settings constituent la seule garantie en production.
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MIGRATE=1
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY must be set in Azure App Settings}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY:?JWT_SIGNING_KEY must be set in Azure App Settings}
      - DJANGO_ALLOWED_HOSTS=novavilleapp.azurewebsites.net,novavilleapp-ghfkbnb7caa0c3g9.francecentral-01.azurewebsites.net,backend,localhost
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novaville-net
    restart: always
    expose:
      - "8000"

  # --- FRONTEND ---
  frontend:
    image: ${AZURE_ACR_NAME}.azurecr.io/novaville-frontend:latest
    container_name: frontend
    # NOTE : FLUTTER_BACKEND_API / API_BASE_URL sont des constantes compilées dans
    # le build Flutter Web (--dart-define). Elles NE PEUVENT PAS être modifiées
    # à l'exécution via des variables d'environnement. Pour mettre à jour l'URL du
    # backend, reconstruire l'image avec le bon --build-arg FLUTTER_BACKEND_API=<url>
    # (voir le secret AZURE_APP_URL dans le workflow GitHub Actions).
    ports:
      - "80:8080"
    networks:
      - novaville-net
    restart: always

networks:
  novaville-net:
    driver: bridge

volumes:
  db-volume:
