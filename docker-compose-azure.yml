version: '3.8'

services:
  postgres:
    image: ${AZURE_ACR_NAME}.azurecr.io/bitnami-postgresql:15
    container_name: postgres
    user: "1001"
    environment:
      - POSTGRESQL_DATABASE=${DB_NAME}
      - POSTGRESQL_USERNAME=${DB_USER}
      - POSTGRESQL_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_VOLUME_DIR=/bitnami/postgresql
    volumes:
      - db-volume:/bitnami
    networks:
      - novaville-net
    restart: always
    healthcheck:
      # Utilisation de variables simples sans message d'erreur
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${AZURE_ACR_NAME}.azurecr.io/novaville-backend:latest
    container_name: backend
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MIGRATE=1
      - COLLECTSTATIC=1
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - JWT_SIGNING_KEY=${JWT_SIGNING_KEY}
      - DJANGO_ALLOWED_HOSTS=novavilleapp.azurewebsites.net,novavilleapp-ghfkbnb7caa0c3g9.francecentral-01.azurewebsites.net,backend,localhost
      - DJANGO_SUPERUSER_USERNAME=${DJANGO_SUPERUSER_USERNAME:-admin}
      - DJANGO_SUPERUSER_EMAIL=${DJANGO_SUPERUSER_EMAIL:-admin@novaville.fr}
      - DJANGO_SUPERUSER_PASSWORD=${DJANGO_SUPERUSER_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novaville-net
    restart: always
    expose:
      - "8000"

  frontend:
    image: ${AZURE_ACR_NAME}.azurecr.io/novaville-frontend:latest
    container_name: frontend
    ports:
      - "80:8080"
    networks:
      - novaville-net
    restart: always

networks:
  novaville-net:
    driver: bridge

volumes:
  db-volume:
