name: Build and Deploy Novaville - Multi-Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Azure Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      # Build du Backend
      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:latest ./backend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:latest

      # Build du Frontend (On garde tes build-args indispensables !)
      - name: Build and push Frontend
        run: |
          docker build \
            --build-arg API_URL="https://novavilleapp.azurewebsites.net" \
            --build-arg ENVIRONMENT="production" \
            -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:latest ./frontend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Azure Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à Azure pour lancer les commandes CLI
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_XXXXX }} # Utilise le nom exact créé par Azure
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_XXXXX }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_XXXXX }}

      # Forcer Azure à utiliser le fichier Docker Compose (Contourne le mode Sidecar)
      - name: Deploy Docker Compose configuration
        run: |
          az webapp config container set \
            --name NovavilleApp \
            --resource-group Novaville \
            --multicontainer-config-type COMPOSE \
            --multicontainer-config-file docker-compose-azure.yml
