name: Build and Deploy Novaville - Multi-Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Azure Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Pull Bitnami Postgres from Public ECR
        run: docker pull public.ecr.aws/bitnami/postgresql:15

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}
          
      - name: Push Bitnami Postgres to ACR
        run: |
          docker tag public.ecr.aws/bitnami/postgresql:15 ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/bitnami-postgresql:15
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/bitnami-postgresql:15

      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:latest ./backend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:latest


      - name: Build and push Frontend
        run: |
          docker build \
            --build-arg FLUTTER_BACKEND_API="${{ secrets.AZURE_APP_URL }}" \
            --build-arg ENVIRONMENT="production" \
            -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:latest ./frontend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Azure Cloud
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Docker Compose
        env:
          AZURE_ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
        run: |
          # Substitute ${AZURE_ACR_NAME} in the compose file (only that variable;
          # all other ${...} references are Azure App Service Application Settings
          # resolved at container runtime).
          envsubst '${AZURE_ACR_NAME}' < docker-compose-azure.yml > /tmp/docker-compose-resolved.yml
          az webapp config container set \
            --name NovavilleApp \
            --resource-group Novaville \
            --multicontainer-config-type COMPOSE \
            --multicontainer-config-file /tmp/docker-compose-resolved.yml \
            --docker-registry-server-url https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io \
            --docker-registry-server-user ${{ secrets.AZURE_ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.AZURE_ACR_PASSWORD }}