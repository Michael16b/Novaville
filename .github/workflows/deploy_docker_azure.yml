name: Build and Deploy Novaville - Multi-Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 0. PRE-DEPLOY TESTS — must pass before any image is built or deployed
  # ─────────────────────────────────────────────────────────────────────────
  pre-deploy-tests:
    name: Pre-deploy – resilience & admin tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "ci-only-unsafe-key-change-me-32chars"
      JWT_SIGNING_KEY: "ci-only-unsafe-key-change-me-32chars"
      DB_ENGINE: "django.db.backends.sqlite3"
      DB_NAME: ":memory:"
      DJANGO_SETTINGS_MODULE: "config.settings"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # ── Django system check ──────────────────────────────────────────────
      - name: Django system check
        working-directory: backend
        run: python manage.py check

      # ── Missing migrations ───────────────────────────────────────────────
      - name: Check for missing migrations
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      # ── ensure_admin tests: verify admin is created with a usable password
      - name: Run ensure_admin tests (admin initialization + usable password)
        run: pytest backend/tests/test_ensure_admin.py -v

      # ── Production configuration tests ──────────────────────────────────
      - name: Run production configuration tests
        run: pytest backend/tests/test_production_config.py -v

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - pre-deploy-tests
    environment: Azure Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull Bitnami Postgres from Public ECR
        run: docker pull public.ecr.aws/bitnami/postgresql:15

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Push Bitnami Postgres to ACR
        run: |
          docker tag public.ecr.aws/bitnami/postgresql:15 ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/bitnami-postgresql:15
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/bitnami-postgresql:15

      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:${{ github.sha }} ./backend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:${{ github.sha }}

      - name: Build and push Frontend
        run: |
          docker build \
            --build-arg ENVIRONMENT="production" \
            -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Azure Cloud
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify DJANGO_SUPERUSER_PASSWORD secret is set
        env:
          ADMIN_PASSWORD: ${{ secrets.DJANGO_SUPERUSER_PASSWORD }}
        run: |
          if [ -z "${ADMIN_PASSWORD}" ]; then
            echo "ERROR: The 'DJANGO_SUPERUSER_PASSWORD' secret is not set in the 'Azure Cloud' environment."
            echo "       Without this secret, the ensure_admin command will skip admin creation and"
            echo "       the backend will start without an administrator account."
            echo "       Set DJANGO_SUPERUSER_PASSWORD in GitHub Settings > Environments > Azure Cloud."
            exit 1
          fi
          echo "DJANGO_SUPERUSER_PASSWORD is set – admin account will be initialized on first startup."

      - name: Configure Azure App Service settings
        run: |
          DB_USER_COMPUTED="${{ secrets.DB_USER }}"
          DB_HOST_COMPUTED="${{ secrets.AZURE_POSTGRES_SERVER_NAME }}.postgres.database.azure.com"
          az webapp config appsettings set \
            --name "${{ secrets.AZURE_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --output none \
            --settings \
              DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}" \
              JWT_SIGNING_KEY="${{ secrets.JWT_SIGNING_KEY }}" \
              DB_ENGINE="django.db.backends.postgresql" \
              DB_HOST="$DB_HOST_COMPUTED" \
              DB_PORT="5432" \
              DB_NAME="${{ secrets.DB_NAME }}" \
              DB_USER="$DB_USER_COMPUTED" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              DJANGO_SUPERUSER_USERNAME="${{ secrets.DJANGO_SUPERUSER_USERNAME }}" \
              DJANGO_SUPERUSER_EMAIL="${{ secrets.DJANGO_SUPERUSER_EMAIL }}" \
              DJANGO_SUPERUSER_PASSWORD="${{ secrets.DJANGO_SUPERUSER_PASSWORD }}" \
              DJANGO_RESET_ADMIN_ON_DEPLOY="0"

      - name: Deploy Docker Compose
        run: |
          DB_USER_COMPUTED="${{ secrets.DB_USER }}"
          DB_HOST_COMPUTED="${{ secrets.AZURE_POSTGRES_SERVER_NAME }}.postgres.database.azure.com"
          export GITHUB_SHA="${{ github.sha }}"
          export AZURE_ACR_NAME="${{ secrets.AZURE_ACR_NAME }}"
          export DB_HOST="$DB_HOST_COMPUTED"
          export DB_NAME="${{ secrets.DB_NAME }}"
          export DB_USER="$DB_USER_COMPUTED"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}"
          export JWT_SIGNING_KEY="${{ secrets.JWT_SIGNING_KEY }}"
          export DJANGO_SUPERUSER_USERNAME="${{ secrets.DJANGO_SUPERUSER_USERNAME }}"
          export DJANGO_SUPERUSER_EMAIL="${{ secrets.DJANGO_SUPERUSER_EMAIL }}"
          export DJANGO_SUPERUSER_PASSWORD="${{ secrets.DJANGO_SUPERUSER_PASSWORD }}"
          export DJANGO_RESET_ADMIN_ON_DEPLOY="0"
          # Substitute all ${VAR} references in the compose file with their values
          envsubst < docker-compose-azure.yml > /tmp/docker-compose-resolved.yml
          az webapp config container set \
            --name "${{ secrets.AZURE_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --multicontainer-config-type COMPOSE \
            --multicontainer-config-file /tmp/docker-compose-resolved.yml \
            --container-registry-url https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io \
            --container-registry-user ${{ secrets.AZURE_ACR_USERNAME }} \
            --container-registry-password ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Post-deploy check - Azure PostgreSQL settings
        run: |
          DB_HOST_ACTUAL=$(az webapp config appsettings list \
            --name "${{ secrets.AZURE_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "[?name=='DB_HOST'].value | [0]" -o tsv)
          DB_USER_ACTUAL=$(az webapp config appsettings list \
            --name "${{ secrets.AZURE_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "[?name=='DB_USER'].value | [0]" -o tsv)

          EXPECTED_HOST_SUFFIX=".postgres.database.azure.com"

          if [[ -z "$DB_HOST_ACTUAL" || "$DB_HOST_ACTUAL" != *"$EXPECTED_HOST_SUFFIX" ]]; then
            echo "ERROR: DB_HOST is not an Azure PostgreSQL host."
            echo "       DB_HOST=$DB_HOST_ACTUAL"
            exit 1
          fi

          echo "OK: DB_HOST and DB_USER point to Azure PostgreSQL."
