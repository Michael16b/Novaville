name: Build and Deploy Novaville - Multi-Container

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Azure Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:latest ./backend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-backend:latest

      - name: Build and push Frontend
        run: |
          docker build \
            --build-arg API_URL="https://novavilleapp.azurewebsites.net" \
            --build-arg ENVIRONMENT="production" \
            -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:latest ./frontend
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/novaville-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: Azure Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Deploy Docker Compose
        run: |
          az webapp config container set \
            --name NovavilleApp \
            --resource-group Novaville \
            --multicontainer-config-type COMPOSE \
            --multicontainer-config-file docker-compose-azure.yml \
            --docker-registry-server-url https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io \
            --docker-registry-server-user ${{ secrets.AZURE_ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.AZURE_ACR_PASSWORD }}
