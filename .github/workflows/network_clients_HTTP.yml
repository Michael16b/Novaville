name: Tests Réseaux

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  network-tests:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api_client_test
            file: test/core/network/api_client_test.dart
          - name: authenticated_client_test
            file: test/core/network/authenticated_client_test.dart
          - name: authenticated_client_factory_test
            file: test/core/network/authenticated_client_factory_test.dart

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.3"

      - name: Create .env file for tests
        working-directory: frontend
        run: |
          cat << 'EOF' > .env
          API_BASE_URL=https://example.com
          SOME_KEY=dummy
          EOF

      - name: Pub get
        working-directory: frontend
        run: flutter pub get

      - name: Run test
        working-directory: frontend
        run: flutter test ${{ matrix.file }}
