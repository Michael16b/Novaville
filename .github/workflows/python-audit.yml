name: Python dependency audit

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Upgrade pip and install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Check files in backend
        run: ls -la

      - name: Run dependency audit
        # PYSEC-2025-183 currently has no fixed PyJWT release in pip-audit.
        # Keep this ignore scoped to that advisory only.
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2025-183

      - name: Generate JSON report
        if: always()
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2025-183 -f json -o pip-audit.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: backend/pip-audit.json
