name: Production Resilience Checks

# Runs on every push to main and on every pull-request so that
# production-breaking misconfigurations are caught before deployment.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. BACKEND — Django system checks + migration completeness
  # ─────────────────────────────────────────────────────────────────────────
  backend-resilience:
    name: Backend – resilience checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DJANGO_SECRET_KEY: "ci-only-unsafe-key-change-me-32chars"
      JWT_SIGNING_KEY:   "ci-only-unsafe-key-change-me-32chars"
      DB_ENGINE:         "django.db.backends.sqlite3"
      DB_NAME:           ":memory:"
      DJANGO_SETTINGS_MODULE: "config.settings"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # ── Django system check in development mode (DEBUG=True) ─────────────
      # Catches import errors, misconfigured apps, broken URL patterns, etc.
      - name: Django system check (DEBUG=True)
        working-directory: backend
        env:
          DJANGO_DEBUG: "1"
        run: python manage.py check

      # ── Django system check in production mode (DEBUG=False) ─────────────
      # Validates that startup succeeds with a real SECRET_KEY and DEBUG=False.
      # This is the same code path that runs when the Docker container starts
      # on Azure, so any RuntimeError (e.g. missing SECRET_KEY) is caught here.
      - name: Django system check (DEBUG=False – production startup simulation)
        working-directory: backend
        env:
          DJANGO_DEBUG: "false"
        run: python manage.py check

      # ── Missing migrations ───────────────────────────────────────────────
      # Ensures every model change has a corresponding migration committed.
      # A missing migration would cause `migrate` to fail on first deploy.
      - name: Check for missing migrations
        working-directory: backend
        env:
          DJANGO_DEBUG: "1"
        run: python manage.py makemigrations --check --dry-run

      # ── Production configuration pytest tests ────────────────────────────
      # Tests in test_production_config.py validate settings that are
      # critical for Azure: ALLOWED_HOSTS, JWT config, CORS, static files,
      # SECRET_KEY guard, and migration completeness.
      - name: Run production configuration tests
        env:
          DJANGO_DEBUG: "1"
        run: pytest backend/tests/test_production_config.py -v

  # ─────────────────────────────────────────────────────────────────────────
  # 2. DEPLOYMENT CONFIG — static assertions on Dockerfiles and CI workflow
  # ─────────────────────────────────────────────────────────────────────────
  deployment-config-checks:
    name: Deployment config – static assertions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Dockerfile writes the correct .env key ───────────────────────────
      # AppConfig.apiBaseUrl reads API_BASE_URL via flutter_dotenv.
      # If the Dockerfile writes a different key the URL is silently ignored
      # and the app falls back to http://localhost:8000 in production.
      - name: Dockerfile must write API_BASE_URL (not FLUTTER_BACKEND_API) to .env
        run: |
          grep -q 'echo "API_BASE_URL=' frontend/Dockerfile || {
            echo "ERROR: frontend/Dockerfile must write API_BASE_URL to .env."
            echo "       AppConfig.apiBaseUrl reads 'API_BASE_URL' via flutter_dotenv."
            echo "       Writing a different key (e.g. FLUTTER_BACKEND_API) means the"
            echo "       backend URL is never picked up and the app falls back to localhost."
            exit 1
          }

      # ── No hardcoded Azure hostname in the deploy workflow ───────────────
      # The Azure App Service URL must come from the AZURE_APP_URL secret so
      # it can be updated without a code change when the hostname changes.
      - name: Deploy workflow must use AZURE_APP_URL secret (not a hardcoded URL)
        run: |
          grep -q 'AZURE_APP_URL' .github/workflows/deploy_docker_azure.yml || {
            echo "ERROR: .github/workflows/deploy_docker_azure.yml must pass"
            echo "       \${{ secrets.AZURE_APP_URL }} as FLUTTER_BACKEND_API build-arg."
            echo "       A hardcoded hostname cannot be changed without a code commit."
            exit 1
          }
          # Also verify the known-bad hardcoded value is NOT present
          if grep -q '"https://novavilleapp.azurewebsites.net"' .github/workflows/deploy_docker_azure.yml; then
            echo "ERROR: Hardcoded Azure URL found in deploy_docker_azure.yml."
            echo "       Replace it with \${{ secrets.AZURE_APP_URL }}."
            exit 1
          fi

      # ── docker-compose-azure.yml must not set runtime FLUTTER_BACKEND_API ─
      # Flutter web compiles String.fromEnvironment at build time; setting
      # FLUTTER_BACKEND_API as a Docker runtime env var has no effect.
      - name: docker-compose-azure.yml must not expose a misleading runtime URL env var
        run: |
          if grep -q 'FLUTTER_BACKEND_API=https://' docker-compose-azure.yml; then
            echo "ERROR: docker-compose-azure.yml sets FLUTTER_BACKEND_API as a runtime"
            echo "       environment variable. Flutter web values are compiled at build time"
            echo "       (docker build --build-arg). This runtime variable has no effect and"
            echo "       misleads operators into thinking they can hot-swap the backend URL."
            exit 1
          fi

      # ── Dockerfile must not fall back to localhost:8000 ──────────────────
      # When AZURE_APP_URL secret is not set, FLUTTER_BACKEND_API is empty and the
      # Dockerfile must NOT silently fall back to http://localhost:8000 (unreachable
      # from users' browsers). The Dockerfile must explicitly reject localhost:8000.
      - name: Dockerfile must guard against localhost:8000 as FLUTTER_BACKEND_API
        run: |
          grep -qF "grep -qF 'localhost:8000'" frontend/Dockerfile || {
            echo "ERROR: frontend/Dockerfile must contain an explicit guard that rejects"
            echo "       FLUTTER_BACKEND_API=http://localhost:8000."
            echo "       When AZURE_APP_URL is not initialised, the build must FAIL rather"
            echo "       than silently deploying an app that calls localhost:8000 (which is"
            echo "       the internal backend port, unreachable from end-users' browsers)."
            exit 1
          }

      # ── docker-compose.yml must not pass localhost:8000 as build arg ─────
      # The FLUTTER_BACKEND_API build arg for the local Docker setup must point to
      # http://localhost (Nginx proxy, port 80), never to http://localhost:8000.
      - name: docker-compose.yml must not set FLUTTER_BACKEND_API to localhost:8000
        run: |
          if grep -E 'FLUTTER_BACKEND_API=http://localhost:8000' docker-compose.yml; then
            echo "ERROR: docker-compose.yml sets FLUTTER_BACKEND_API=http://localhost:8000."
            echo "       localhost:8000 is the internal backend port, not accessible from"
            echo "       end-users' browsers. Use http://localhost (Nginx proxy, port 80)."
            exit 1
          fi
