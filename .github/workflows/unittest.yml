name: Tests unitaires backend

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "ci-only-unsafe-key-change-me-32chars"
      JWT_SIGNING_KEY: "ci-only-unsafe-key-change-me-32chars"
      DB_ENGINE: "django.db.backends.sqlite3"
      DB_NAME: ":memory:"

    steps:
      # 1. Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Mettre en place Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Installer les dépendances
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 4. Lancer les tests
      - name: Run tests
        run: |
          pytest backend/tests/*.py