name: Flutter Release Builds

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
      - "V*"
    paths:
      - "frontend/**"
      - ".github/workflows/flutter_release.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/flutter_release.yml"
  workflow_dispatch:
    inputs:
      backend_api_url:
        description: "Public API base URL for native builds (Android, Windows, Linux, macOS/iOS)"
        required: false
        type: string

env:
  FLUTTER_VERSION: "3.38.3"

jobs:
  quality:
    name: Analyze and test Flutter frontend
    runs-on: ubuntu-latest
    environment: Azure Cloud
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create .env file for CI
        run: |
          cat << 'EOF' > .env
          API_BASE_URL=/api
          DEBUG=false
          EOF

      - name: Pub get
        run: flutter pub get

      - name: Rename App
        shell: bash
        run: |
          RAW_NAME="${{ secrets.AZURE_ACR_NAME }}"
          if [ -z "$RAW_NAME" ]; then
            APP_NAME="Novaville"
          else
            APP_NAME=$(echo "$RAW_NAME" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          fi
          echo "Renaming app to: $APP_NAME"
          dart pub global activate rename
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          rename setAppName --targets ios,android,macos,windows,linux --value "$APP_NAME"

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  web-pwa:
    name: Build web PWA
    runs-on: ubuntu-latest
    needs: quality
    environment: Azure Cloud
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create .env file for web
        run: |
          cat << 'EOF' > .env
          API_BASE_URL=/api
          DEBUG=false
          EOF

      - name: Pub get
        run: flutter pub get

      - name: Rename App
        shell: bash
        run: |
          RAW_NAME="${{ secrets.AZURE_ACR_NAME }}"
          if [ -z "$RAW_NAME" ]; then
            APP_NAME="Novaville"
          else
            APP_NAME=$(echo "$RAW_NAME" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          fi
          echo "Renaming app to: $APP_NAME"
          dart pub global activate rename
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          rename setAppName --targets ios,android,macos,windows,linux --value "$APP_NAME"

      - name: Build web release
        run: |
          flutter config --enable-web
          flutter build web --release --pwa-strategy=offline-first \
            --dart-define=FLUTTER_BACKEND_API=/api

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaville-web-pwa
          path: frontend/build/web
          if-no-files-found: error
          retention-days: 14

  android:
    name: Build Android APK and AAB
    runs-on: ubuntu-latest
    needs: quality
    environment: Azure Cloud
    env:
      BACKEND_API_URL: ${{ github.event.inputs.backend_api_url || vars.FLUTTER_BACKEND_API }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Validate backend URL
        run: |
          if [ -z "$BACKEND_API_URL" ]; then
            BACKEND_API_URL="https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api"
            echo "BACKEND_API_URL=$BACKEND_API_URL" >> $GITHUB_ENV
          fi
          printf 'API_BASE_URL=%s\nDEBUG=false\n' "$BACKEND_API_URL" > .env

      - name: Pub get
        run: flutter pub get

      - name: Rename App
        shell: bash
        run: |
          RAW_NAME="${{ secrets.AZURE_ACR_NAME }}"
          if [ -z "$RAW_NAME" ]; then
            APP_NAME="Novaville"
          else
            APP_NAME=$(echo "$RAW_NAME" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          fi
          echo "Renaming app to: $APP_NAME"
          dart pub global activate rename
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          rename setAppName --targets ios,android,macos,windows,linux --value "$APP_NAME"

      - name: Build APK
        run: flutter build apk --release --dart-define=FLUTTER_BACKEND_API="$BACKEND_API_URL"

      - name: Build App Bundle
        run: flutter build appbundle --release --dart-define=FLUTTER_BACKEND_API="$BACKEND_API_URL"

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaville-android-apk
          path: frontend/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaville-android-aab
          path: frontend/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Build Linux desktop
    runs-on: ubuntu-latest
    needs: quality
    environment: Azure Cloud
    env:
      BACKEND_API_URL: ${{ github.event.inputs.backend_api_url || vars.FLUTTER_BACKEND_API }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libsecret-1-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Validate backend URL
        run: |
          if [ -z "$BACKEND_API_URL" ]; then
            BACKEND_API_URL="https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api"
            echo "BACKEND_API_URL=$BACKEND_API_URL" >> $GITHUB_ENV
          fi
          printf 'API_BASE_URL=%s\nDEBUG=false\n' "$BACKEND_API_URL" > .env

      - name: Pub get
        run: flutter pub get

      - name: Rename App
        shell: bash
        run: |
          RAW_NAME="${{ secrets.AZURE_ACR_NAME }}"
          if [ -z "$RAW_NAME" ]; then
            APP_NAME="Novaville"
          else
            APP_NAME=$(echo "$RAW_NAME" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          fi
          echo "Renaming app to: $APP_NAME"
          dart pub global activate rename
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          rename setAppName --targets ios,android,macos,windows,linux --value "$APP_NAME"

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux release
        run: flutter build linux --release --dart-define=FLUTTER_BACKEND_API="$BACKEND_API_URL"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaville-linux
          path: frontend/build/linux/x64/release/bundle
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Build Windows desktop
    runs-on: windows-latest
    needs: quality
    environment: Azure Cloud
    env:
      BACKEND_API_URL: ${{ github.event.inputs.backend_api_url || vars.FLUTTER_BACKEND_API }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Validate backend URL
        shell: bash
        run: |
          if [ -z "$BACKEND_API_URL" ]; then
            BACKEND_API_URL="https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api"
            echo "BACKEND_API_URL=$BACKEND_API_URL" >> $GITHUB_ENV
          fi
          printf 'API_BASE_URL=%s\nDEBUG=false\n' "$BACKEND_API_URL" > .env

      - name: Pub get
        shell: bash
        run: flutter pub get
        
      - name: Rename App
        shell: bash
        run: |
          RAW_NAME="${{ secrets.AZURE_ACR_NAME }}"
          if [ -z "$RAW_NAME" ]; then
            APP_NAME="Novaville"
          else
            APP_NAME=$(echo "$RAW_NAME" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          fi
          echo "Renaming app to: $APP_NAME"
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          dart pub global activate rename
          dart pub global run rename setAppName --targets ios,android,macos,windows,linux --value "$APP_NAME"

      - name: Enable Windows desktop
        shell: bash
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        shell: bash
        run: flutter build windows --release --dart-define=FLUTTER_BACKEND_API="$BACKEND_API_URL"

      - name: Build Windows Installer with Inno Setup
        shell: cmd
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss'

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaville-windows-exe
          path: frontend/build/windows/x64/installer/${{ env.APP_NAME }}-Windows-Setup.exe
          if-no-files-found: error
          retention-days: 14

  macos-ios:
    name: Build macOS and attempt iOS
    runs-on: macos-14
    needs: quality
    continue-on-error: true
    environment: Azure Cloud
    env:
      BACKEND_API_URL: ${{ github.event.inputs.backend_api_url || vars.FLUTTER_BACKEND_API }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Validate backend URL
        run: |
          if [ -z "$BACKEND_API_URL" ]; then
            BACKEND_API_URL="https://${{ secrets.AZURE_ACR_NAME }}.azurecr.io/api"
            echo "BACKEND_API_URL=$BACKEND_API_URL" >> $GITHUB_ENV
          fi
          printf 'API_BASE_URL=%s\nDEBUG=false\n' "$BACKEND_API_URL" > .env

      - name: Pub get
        run: flutter pub get

      - name: Rename App
        shell: bash
        run: |
          RAW_NAME="${{ secrets.AZURE_ACR_NAME }}"
          if [ -z "$RAW_NAME" ]; then
            APP_NAME="Novaville"
          else
            APP_NAME=$(echo "$RAW_NAME" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
          fi
          echo "Renaming app to: $APP_NAME"
          dart pub global activate rename
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          rename setAppName --targets ios,android,macos,windows,linux --value "$APP_NAME"

      - name: Enable desktop and iOS
        run: flutter config --enable-macos-desktop --enable-ios

      - name: Build macOS release
        continue-on-error: true
        run: flutter build macos --release --dart-define=FLUTTER_BACKEND_API="$BACKEND_API_URL"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaville-macos
          path: frontend/build/macos/Build/Products/Release/*.app
          if-no-files-found: warn
          retention-days: 14

      - name: Attempt iOS release build without codesigning
        continue-on-error: true
        run: flutter build ios --release --no-codesign --dart-define=FLUTTER_BACKEND_API="$BACKEND_API_URL"

  publish-release:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs:
      - web-pwa
      - android
      - linux
      - windows
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    permissions:
      contents: write
    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: novaville-web-pwa
          path: release-assets/web

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: novaville-android-apk
          path: release-assets/android-apk

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: novaville-android-aab
          path: release-assets/android-aab

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: novaville-linux
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: novaville-windows-exe
          path: release-assets/windows-exe

      - name: Package desktop and web downloads
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import shutil
          import zipfile

          root = pathlib.Path('release-assets')

          def zip_dir(source_dir: pathlib.Path, target_file: pathlib.Path) -> None:
              with zipfile.ZipFile(target_file, 'w', compression=zipfile.ZIP_DEFLATED) as archive:
                  for file_path in source_dir.rglob('*'):
                      if file_path.is_file():
                          archive.write(file_path, file_path.relative_to(source_dir))

          zip_dir(root / 'web', root / 'novaville-web-pwa.zip')
          zip_dir(root / 'linux', root / 'novaville-linux.zip')

          shutil.copy2(next((root / 'windows-exe').rglob('*.exe')), root / 'novaville-windows.exe')
          shutil.copy2(next((root / 'android-apk').rglob('*.apk')), root / 'novaville-android.apk')
          shutil.copy2(next((root / 'android-aab').rglob('*.aab')), root / 'novaville-android.aab')
          PY

      - name: Collect release files
        id: release-files
        shell: bash
        run: |
          android_apk=release-assets/novaville-android.apk
          android_aab=release-assets/novaville-android.aab
          if [ -z "$android_apk" ] || [ -z "$android_aab" ]; then
            echo "Unable to locate Android release files in downloaded artifacts." >&2
            exit 1
          fi

          printf 'android_apk=%s\n' "$android_apk" >> "$GITHUB_OUTPUT"
          printf 'android_aab=%s\n' "$android_aab" >> "$GITHUB_OUTPUT"
          printf 'web_zip=%s\n' "release-assets/novaville-web-pwa.zip" >> "$GITHUB_OUTPUT"
          printf 'linux_zip=%s\n' "release-assets/novaville-linux.zip" >> "$GITHUB_OUTPUT"
          printf 'windows_exe=%s\n' "release-assets/novaville-windows.exe" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.release-files.outputs.android_apk }}
            ${{ steps.release-files.outputs.android_aab }}
            ${{ steps.release-files.outputs.web_zip }}
            ${{ steps.release-files.outputs.linux_zip }}
            ${{ steps.release-files.outputs.windows_exe }}